spring.application.name=customer-service-readmodel
server.port=8102

spring.mongodb.uri=${CUSTOMER_READ_MONGODB_URI:mongodb://localhost:27017/customer-read-model}
spring.kafka.bootstrap-servers=localhost:9092,localhost:9096,localhost:9097,localhost:9098,localhost:9099

app.kafka.customer-events-topic=${CUSTOMER_EVENTS_TOPIC:crm-es-events}

spring.kafka.consumer.group-id=customer-service-readmodel
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
