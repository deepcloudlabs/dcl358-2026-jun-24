spring.application.name=customer-service-writemodel
server.port=8101

app.kafka.customer-events-topic=${CUSTOMER_EVENTS_TOPIC:crm-es-events}

spring.kafka.bootstrap-servers=localhost:9092,localhost:9096,localhost:9097,localhost:9098,localhost:9099
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5

app.kafka.customer-events-partitions=5
