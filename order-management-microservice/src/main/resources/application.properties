spring.application.name=order-management-microservice
spring.main.banner-mode=off
server.address=${SERVER_ADDRESS:localhost}
server.port=${SERVER_PORT:5600}
server.servlet.context-path=/order
spring.mvc.servlet.path=/api/v1

spring.datasource.url=${ORDER_DB_URL:jdbc:mysql://localhost:3306/orderdb?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${ORDER_DB_USERNAME:root}
spring.datasource.password=${ORDER_DB_PASSWORD:Secret_123}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

spring.kafka.bootstrap-servers=localhost:9092,localhost:9096,localhost:9097,localhost:9098,localhost:9099
spring.kafka.consumer.group-id=order-saga-orchestrator
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.listener.ack-mode=record
spring.kafka.admin.auto-create=true
